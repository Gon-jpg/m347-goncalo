apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
spec:
  type: NodePort
  selector:
    app: account
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: buysell-service
spec:
  type: NodePort
  selector:
    app: buysell
  ports:
    - port: 8002
      targetPort: 8002
      nodePort: 30082
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: sendreceive-service
spec:
  type: NodePort
  selector:
    app: sendreceive
  ports:
    - port: 8003
      targetPort: 8003
      nodePort: 30083
      protocol: TCP
